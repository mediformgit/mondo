name: CI

# Lints and builds on every PR (and on main) so broken changes are caught
# before they reach a Vercel preview / production deploy.
on:
  push:
    branches: [main]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run lint
      - name: Security invariants (CSP / key confinement) — BYOK lifeline
        run: npm run check:security
      - name: Site integrity (internal links / ids / lesson ordering)
        run: npm run check
      - run: npm run build
        env:
          NEXT_TELEMETRY_DISABLED: "1"
